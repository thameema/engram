[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "engram-api"
version = "0.1.0"
description = "engram REST API server"
requires-python = ">=3.11"
dependencies = [
    "engram-core",
    "engram-orchestrator",
    "engram-mcp-server",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "pydantic>=2.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["engram_api*"]

[project.scripts]
engram-server = "engram_api.main:main"
