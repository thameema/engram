[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "engram-core"
version = "0.2.0"
description = "engram persistent memory core — ArcadeDB knowledge graph + vector store"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "openai>=1.30",
    "anthropic>=0.30",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
    "tenacity>=8.0",
    "cryptography>=42.0",
]

[project.optional-dependencies]
# pip install 'engram-core[local-embeddings]'
# Adds sentence-transformers + torch (~2 GB). Use provider: local in engram.yaml.
local-embeddings = [
    "sentence-transformers>=2.7",
    "spacy>=3.7",
]
# pip install 'engram-core[voyage]'
# Lightweight Voyage AI client. Use provider: voyage in engram.yaml.
voyage = ["voyageai>=0.2"]
# pip install 'engram-core[qdrant]'
# Enables ENGRAM_VECTOR_BACKEND=qdrant — HNSW ANN search via Qdrant.
qdrant = ["qdrant-client>=1.9"]
# pip install 'engram-core[community]'
# Adds networkx for Louvain/greedy community detection (Feature 3.4).
community = ["networkx>=3.0"]
all = ["engram-core[local-embeddings,voyage,qdrant,community]"]

[project.scripts]
engram-import = "engram.cli.import_cmd:main"
engram-git = "engram.cli.git_hooks:main"
engram-decay = "engram.cli.decay_cli:main"
engram-vault = "engram.cli.vault_cli:main"
engram-community = "engram.cli.community_cli:main"
engram-migrate = "engram.cli.migrate_cli:main"
engram-export = "engram.cli.export_cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["engram*"]
