[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "engram-core"
version = "0.1.0"
description = "engram persistent memory core — knowledge graph + vector store"
requires-python = ">=3.11"
dependencies = [
    "graphiti-core>=0.3",
    "qdrant-client>=1.9",
    "openai>=1.30",
    "anthropic>=0.30",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
    "neo4j>=5.20",
    "asyncio-throttle>=1.0",
    "tenacity>=8.0",
]

[project.optional-dependencies]
local-embeddings = ["sentence-transformers>=2.7"]
all = ["engram-core[local-embeddings]"]

[tool.setuptools.packages.find]
where = ["."]
include = ["engram*"]
