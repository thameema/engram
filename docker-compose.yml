version: "3.9"

services:

  arcadedb:
    image: arcadedata/arcadedb:26.5.1
    container_name: engram-arcadedb
    ports:
      - "2480:2480"   # HTTP REST + Studio UI
      - "2424:2424"   # binary protocol
    environment:
      JAVA_OPTS: "-Darcadedb.server.rootPassword=${ARCADEDB_PASSWORD:-engram}"
      ARCADEDB_SERVER_PLUGINS: ""
    volumes:
      - arcadedb_data:/home/arcadedb/databases
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2480/api/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  engram:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        EMBED_MODE: ${ENGRAM_EMBED_MODE:-online}   # online = OpenAI API | local = sentence-transformers
    container_name: engram
    ports:
      - "8765:8765"   # MCP server
      - "8766:8766"   # REST API + dashboard
    environment:
      ARCADEDB_HOST: arcadedb
      ARCADEDB_PORT: 2480
      ARCADEDB_PASSWORD: ${ARCADEDB_PASSWORD:-engram}
      ENGRAM_EMBED_MODE: ${ENGRAM_EMBED_MODE:-online}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}       # used by the default openai embeddings provider
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}       # optional — only needed if provider: voyage
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ENGRAM_API_KEY: ${ENGRAM_API_KEY}
      ENGRAM_VAULT_KEY: ${ENGRAM_VAULT_KEY}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      ENGRAM_CONFIG: /app/engram.yaml
    volumes:
      - ./engram.yaml:/app/engram.yaml:ro
      - ./agents:/app/agents:ro
      - ./skills:/app/skills:ro
    depends_on:
      arcadedb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8766/api/v1/admin/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: engram-evolution
    profiles: ["whatsapp"]
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      WEBHOOK_GLOBAL_URL: http://engram:8766/webhook/whatsapp
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
    volumes:
      - evolution_data:/evolution/instances
    restart: unless-stopped

volumes:
  arcadedb_data:
  evolution_data:
