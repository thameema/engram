[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "engram-mcp-server"
version = "0.1.0"
description = "engram MCP server — stdio and SSE transports"
requires-python = ">=3.11"
dependencies = [
    "engram-core",
    "mcp>=1.0",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "sse-starlette>=2.0",
    "httpx>=0.27",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["engram_mcp*"]

[project.scripts]
engram-mcp = "engram_mcp.server:main"
engram-mcp-stdio = "engram_mcp.transports.stdio:main"
