name: Release & Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & attach packages to release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install --upgrade pip build

      - name: Build engram-sdk
        run: python -m build packages/sdk --outdir dist/

      - name: Build engram-core
        run: |
          pip install -e packages/core
          python -m build packages/core --outdir dist/

      - name: Upload packages to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Create release if it doesn't exist yet, otherwise just upload assets
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.whl dist/*.tar.gz --clobber
          else
            gh release create "$TAG" \
              --title "engram $TAG" \
              --generate-notes \
              dist/*.whl dist/*.tar.gz
          fi
