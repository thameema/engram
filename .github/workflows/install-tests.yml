name: Install tests

on:
  push:
    branches: [master]
    paths:
      - 'install.sh'
      - 'install-server.sh'
      - 'install-client.sh'
      - 'install-client.ps1'
      - 'docker-compose.yml'
      - 'engram.yaml.example'
      - '.env.example'
      - 'docker/**'
      - 'hooks/**'
      - 'tools/verify-install.sh'
      - 'packages/sdk/**'
      - 'tests/install/**'
      - '.github/workflows/install-tests.yml'
  pull_request:
    paths:
      - 'install.sh'
      - 'install-server.sh'
      - 'install-client.sh'
      - 'install-client.ps1'
      - 'docker-compose.yml'
      - 'engram.yaml.example'
      - '.env.example'
      - 'docker/**'
      - 'hooks/**'
      - 'tools/verify-install.sh'
      - 'packages/sdk/**'
      - 'tests/install/**'
      - '.github/workflows/install-tests.yml'

# Cancel in-progress runs of this workflow on the same ref when a new push lands.
concurrency:
  group: install-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Layer 1: static checks — run on every push, fast (<30s) ──────────────
  unit:
    name: "Layer 1 (unit / static checks)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq

      - name: Run Layer 1
        run: bash tests/install/run.sh unit

  # ─── Layer 2: install integration in Docker sandbox — run on PR + master ──
  integration:
    name: "Layer 2 (install integration)"
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Docker available
        run: docker --version && docker compose version

      - name: Run Layer 2
        run: bash tests/install/run.sh integration

  # ─── Layer 3: real-Docker E2E — runs on tag pushes only ──────────────────
  e2e:
    name: "Layer 3 (real-Docker E2E)"
    runs-on: ubuntu-latest
    needs: [unit, integration]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Docker available
        run: docker --version && docker compose version

      - name: Run Layer 3
        run: bash tests/install/run.sh e2e

      - name: Capture engram logs on failure
        if: failure()
        run: |
          if [ -d /tmp/engram-e2e-src ]; then
            cd /tmp/engram-e2e-src
            docker compose --project-name engram-e2e \
              --env-file /tmp/engram-e2e-data/.env logs engram | tail -100
          fi

      - name: Teardown
        if: always()
        run: |
          if [ -d /tmp/engram-e2e-src ]; then
            cd /tmp/engram-e2e-src
            docker compose --project-name engram-e2e \
              --env-file /tmp/engram-e2e-data/.env down -v || true
          fi

  # ─── macOS smoke check — runs syntax + static checks on macOS too ────────
  # Confirms install scripts work with BSD tools (mktemp, sed, stat).
  macos-static:
    name: "macOS static checks"
    runs-on: macos-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Layer 1 on macOS (BSD tools)
        run: bash tests/install/run.sh unit
